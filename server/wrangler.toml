name = "qiangu-server"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[[durable_objects.bindings]]
name = "QUEUE"
class_name = "QueueDO"

[[durable_objects.bindings]]
name = "MATCH"
class_name = "MatchDO"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "RATINGS"
class_name = "RatingsDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QueueDO", "MatchDO"]

[[durable_objects.bindings]]
name = "PROFILE"
class_name = "ProfileDO"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RoomDO", "RatingsDO"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["ProfileDO"]
